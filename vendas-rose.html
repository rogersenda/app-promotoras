}

function isM(p){return tab==='v'?(qV[p.id]||0)>0:qI[p.id]!==undefined}
function fList(){

function render(){

  var groups=[],idx={};

  var ao=!!fQ||fBrand==='mk',h='';

    h+='<div class="cat"><div class="ch'+(open?' op':'')+(sel>0?' has':'')+'" onclick="tog(\''+g.b+'|'+g.c+'\')">'

    if(open){
      h+='<div class="its">';
      g.items.forEach(function(p){
        var v=tab==='v'?(qV[p.id]||0):(qI[p.id]===undefined?null:qI[p.id]);
        var on=tab==='v'?(v>0):(v!==null);
        var rl='<div class="pn"><div class="t">'+p.label+'</div><div class="s">'+p.ref+(p.ean?' · '+p.ean:'')+'</div></div>';
        if(tab==='v'){
          h+='<div class="row'+(on?' rv':'')+'" id="r'+p.id+'">'+rl
            +'<div class="stp'+(v>0?'':' sz')+'" id="s'+p.id+'">'
            +'<button class="mn" onclick="adj(\''+p.id+'\',-1)">−</button>'
            +'<input type="number" inputmode="numeric" value="'+(v||0)+'" id="q'+p.id+'" onchange="chg(\''+p.id+'\',this.value)" min="0">'
            +'<button class="pl" onclick="adj(\''+p.id+'\',1)">+</button></div></div>';
        }else{
          h+='<div class="row'+(on?' ri':'')+'" id="r'+p.id+'">'+rl
            +'<div class="ctr"><input type="number" inputmode="numeric" placeholder="—" value="'+(v===null?'':v)+'" id="q'+p.id+'" onchange="iChg(\''+p.id+'\',this.value)"'+(on?' class="fi"':'')+' min="0"></div></div>';
        }
      });
      h+='</div>';
    }
    h+='</div>';
  });
  $('ls').innerHTML=h;rTot();

function tog(k){if(!fQ&&fBrand!=='mk'){openC[k]=!openC[k];render()}}
function adj(id,d){var p=PV.find(function(x){return x.id===id});if(!p)return;var v=Math.max(0,(qV[p.id]||0)+d);if(v===0)delete qV[p.id];else qV[p.id]=v;var inp=$('q'+id);if(inp)inp.value=v;var row=$('r'+id);if(row)row.className='row'+(v>0?' rv':'');var stp=$('s'+id);if(stp)stp.className='stp'+(v>0?'':' sz');sv();rTot()}
function chg(id,val){var p=PV.find(function(x){return x.id===id});if(!p)return;var v=Math.max(0,parseInt(val)||0);if(v===0)delete qV[p.id];else qV[p.id]=v;var row=$('r'+id);if(row)row.className='row'+(v>0?' rv':'');var stp=$('s'+id);if(stp)stp.className='stp'+(v>0?'':' sz');sv();rTot()}
function iChg(id,val){var p=PI.find(function(x){return x.id===id});if(!p)return;if(val==='')delete qI[p.id];else qI[p.id]=Math.max(0,parseInt(val)||0);var row=$('r'+id);if(row)row.className='row'+(qI[p.id]!==undefined?' ri':'');var inp=$('q'+id);if(inp)inp.className=qI[p.id]!==undefined?'fi':'';sv();rTot()}
