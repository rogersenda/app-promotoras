<div id="tst"></div><script>var CFG=window.__C__;

}

function bWA(){
  var obs=($('obs')&&$('obs').value)||'';obs=obs.trim();
  var ls=[tab==='v'?'VENDAS DO DIA':'INVENTARIO'];
  ls.push('Promotora: '+CFG.nome,'Loja: '+(lojaA||'--'),'Data: '+(fd($('dt').value)||'--'));
  if(obs)ls.push('Obs: '+obs);
  if(tab==='v'){
    var byB={};PV.filter(function(p){return(qV[p.id]||0)>0}).forEach(function(p){(byB[p.b]=byB[p.b]||[]).push(p)});
    ['GOMMA','YELSEW'].forEach(function(b){if(!byB[b])return;ls.push('');ls.push('*'+b+'*');byB[b].forEach(function(p){ls.push('- '+p.label+': '+qV[p.id])})});
    ls.push('');ls.push('Total: '+Object.values(qV).reduce(function(a,b){return a+(+b||0)},0));
  }else{
    var byB={};PI.filter(function(p){return qI[p.id]!==undefined}).forEach(function(p){(byB[p.b]=byB[p.b]||[]).push(p)});
    ['GOMMA','YELSEW','XD','INTEGRAL'].forEach(function(b){if(!byB[b])return;ls.push('');ls.push('*'+b+'*');byB[b].forEach(function(p){ls.push('- '+p.label+': '+qI[p.id])})});
  }
  return ls.join('\n');
}
function bCSV(){
  var obs=($('obs')&&$('obs').value)||'';obs=obs.trim();
  var r='Data;Promotora;Loja;Obs;Marca;Categoria;Produto;Ref;EAN;'+(tab==='v'?'Qtd Vendida':'Estoque')+'\n';
  var src=tab==='v'?PV.filter(function(p){return(qV[p.id]||0)>0}):PI.filter(function(p){return qI[p.id]!==undefined});
  var dt=fd($('dt').value)||'--';
  src.forEach(function(p){var q=tab==='v'?(qV[p.id]||0):qI[p.id];r+=[dt,CFG.nome,lojaA||'--',obs,p.b,p.cat,p.label,p.ref,p.ean,q].map(function(v){return'"'+String(v==null?'':v).replace(/"/g,'""')+'"'}).join(';')+'\n'});
  return r;
}
function cp(txt,msg){try{navigator.clipboard.writeText(txt).then(function(){tst(msg)},function(){fb(txt,msg)})}catch(e){fb(txt,msg)}}
function fb(txt,msg){var a=document.createElement('textarea');a.value=txt;a.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');tst(msg)}catch(e){}document.body.removeChild(a)}
